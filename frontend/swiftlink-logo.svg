<svg width="340" height="100" viewBox="0 0 340 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tileGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF" />
      <stop offset="100%" stop-color="#00D4FF" />
    </linearGradient>
    <filter id="glassGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="80" height="80" rx="16" fill="url(#tileGradient)" filter="url(#glassGlow)" />

  <path d="M 65 35 L 75 35 L 75 45 M 35 65 L 25 65 L 25 55 M 25 55 C 25 35, 50 35, 50 50 C 50 65, 75 65, 75 45" stroke="#00F5A0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)" />

  <text x="110" y="60" font-family="Inter Bold, sans-serif" font-size="32" fill="#1A1A2E">Swiftlink</text>
</svg>